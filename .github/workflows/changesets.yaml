name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Changesets
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: pnpm install --frozen-lockfile

      - id: changesets
        uses: changesets/action@v1
        with:
          title: "release: version packages"
          commit: "release: version packages"
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish npm package
    needs: release
    if: needs.release.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    concurrency:
      group: live-e2e-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch origin main:refs/remotes/origin/main

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: pnpm install --frozen-lockfile

      - run: moon run wrangler-builds:test
      - run: moon run wrangler-builds:build
      - run: moon run wrangler-builds:e2e
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_BUILDS_E2E_ACCOUNT_ID: ${{ secrets.WRANGLER_BUILDS_E2E_ACCOUNT_ID }}
          WRANGLER_BUILDS_E2E_BUILD_TOKEN_UUID: ${{ secrets.WRANGLER_BUILDS_E2E_BUILD_TOKEN_UUID }}
          WRANGLER_BUILDS_E2E_REPO_CONNECTION_UUID: ${{ secrets.WRANGLER_BUILDS_E2E_REPO_CONNECTION_UUID }}

      - run: pnpm exec changeset publish
        env:
          NPM_CONFIG_PROVENANCE: "false"
