language: typescript
layer: tool
tags:
  - cloudflare
  - cli

fileGroups:
  sources:
    - src/**/*
    - schema/**/*
  tests:
    - tests/**/*

tasks:
  build:
    command: tsdown
    args:
      - src/index.ts
      - src/cli.ts
      - --format
      - esm
      - --dts
      - --out-dir
      - dist
      - --clean
      - --unbundle
    inputs:
      - "@group(sources)"
      - package.json
      - tsconfig.json
    outputs:
      - dist

  test:
    command: vitest
    args:
      - run
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - package.json
      - tsconfig.json

  bdd:
    deps:
      - build
    description: Run the Cloudflare-backed Cucumber scenarios for the live example worker.
    command: node
    args:
      - --import
      - tsx
      - ./node_modules/@cucumber/cucumber/bin/cucumber.js
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - cucumber.mjs
      - package.json
      - tsconfig.json
    options:
      cache: false
      runInCI: false

  e2e:
    deps:
      - build
    description: Run the live Cloudflare end-to-end suite for the example worker.
    command: node
    args:
      - --import
      - tsx
      - ./node_modules/@cucumber/cucumber/bin/cucumber.js
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - cucumber.mjs
      - package.json
      - tsconfig.json
    options:
      cache: false
      runInCI: true

  typecheck:
    command: tsc
    args:
      - -p
      - tsconfig.json
      - --noEmit
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - package.json
      - tsconfig.json

  lint:
    command: oxlint
    args:
      - src
      - tests
      - --deny-warnings
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - package.json

  format:
    command: oxfmt
    args:
      - --check
      - src
      - tests
      - tsconfig.json
    inputs:
      - "@group(sources)"
      - "@group(tests)"
      - tsconfig.json

  format-fix:
    command: oxfmt
    args:
      - --write
      - src
      - tests
      - tsconfig.json
    options:
      cache: false
